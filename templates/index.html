<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Salud Inteligente</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="layout">
      <!-- SIDEBAR -->

      <aside class="sidebar">
        <div class="logo-box">
          <img
            src="{{ url_for('static', filename='imagenes/logo.png') }}"
            class="logo-img"
          />

          <div>
            <h2>Salud</h2>
            <h2>Inteligente</h2>
          </div>
        </div>

        <ul class="menu">
          <li>
            <a href="/"> 🏠 Inicio </a>
          </li>

          <li>
            <a href="/pacientes"> 👤 Pacientes </a>
          </li>

          <li>
            <a href="/historial"> 📜 Historial </a>
          </li>

          <li>
            <a href="/consultas"> 🚨 Consultas necesarias </a>
          </li>
        </ul>
      </aside>

      <!-- MAIN -->

      <main class="main">
        <!-- HEADER -->

        <header class="topbar">
          <div>
            <h1>Hola 👋</h1>

            <p id="fecha"></p>
          </div>

          <div class="pulse">❤️</div>
        </header>

        <!-- FORMULARIO -->

        <div class="card form-card">
          <h3>👤 Datos del paciente</h3>

          <div class="form-grid">
            <!-- NOMBRE -->

            <div class="input-group">
              <label> Nombre completo </label>

              <input type="text" id="nombre" required />
            </div>

            <!-- EDAD -->

            <div class="input-group">
              <label> Edad </label>

              <input type="number" id="edad" required />
            </div>

            <!-- SISTOLICA -->

            <div class="input-group">
              <label> Presión Sistólica </label>

              <input type="number" id="sistolica" required />
            </div>

            <!-- DIASTOLICA -->

            <div class="input-group">
              <label> Presión Diastólica </label>

              <input type="number" id="diastolica" required />
            </div>
          </div>
        </div>

        <!-- DASHBOARD -->

        <section class="dashboard">
          <!-- PRESION -->

          <div class="card presion-card">
            <h3>❤️ Presión arterial</h3>

            <div class="valor" id="presion">--/--</div>

            <p id="estadoPresion" class="estado">Sin datos</p>
          </div>

          <!-- RESULTADO -->

          <div class="card resultado-card">
            <h3>🧠 Resultado del análisis</h3>

            <div id="resultado">Esperando evaluación...</div>
          </div>
        </section>

        <!-- TITULO -->

        <h2 class="section-title">🩺 Selecciona síntomas</h2>

        <!-- CARRUSEL -->

        <div class="carrusel-container">
          <form id="formulario" class="grid">
            {% for s in sintomas %}

            <label class="card-s">
              <input type="checkbox" value="{{ s }}" />

              <div class="card-content">
                <img
                  src="{{ url_for('static', filename='imagenes/' + s + '.png') }}"
                  class="img"
                  onerror="this.src = '/static/imagenes/default.png'"
                />

                <p>{{ s.replace('_',' ').capitalize() }}</p>
              </div>
            </label>

            {% endfor %}
          </form>

          <!-- FLECHAS -->

          <div class="controles">
            <button class="arrow" onclick="scrollCarrusel(-1)">❮</button>

            <button class="arrow" onclick="scrollCarrusel(1)">❯</button>
          </div>
        </div>

        <!-- BOTON -->

        <button class="btn" onclick="evaluarTodo()">
          🔍 Evaluar estado de salud
        </button>
      </main>
    </div>

    <script>
      /* FECHA */

      document.getElementById("fecha").innerText =
        new Date().toLocaleDateString(
          "es-MX",

          {
            weekday: "long",
            day: "numeric",
            month: "long",
            year: "numeric",
          },
        );

      /* CARRUSEL */

      function scrollCarrusel(direction) {
        const carrusel = document.querySelector(".grid");

        carrusel.scrollBy({
          left: direction * 320,
          behavior: "smooth",
        });
      }

      /* EVALUAR */

      async function evaluarTodo() {
        let nombre = document.getElementById("nombre").value;

        let edad = document.getElementById("edad").value;

        let s = parseInt(document.getElementById("sistolica").value);

        let d = parseInt(document.getElementById("diastolica").value);

        /* SINTOMAS */

        let sintomas = [];

        document.querySelectorAll("input:checked").forEach((el) => {
          sintomas.push(el.value);
        });

        /* VALIDACION */

        if (nombre === "" || edad === "" || isNaN(s) || isNaN(d)) {
          alert("Completa todos los campos");

          return;
        }

        /* PRESION */

        document.getElementById("presion").innerText = s + "/" + d;

        /* CLASIFICACION */

        let estado = "Normal";
        let clase = "bajo";

        if (s >= 140 || d >= 90) {
          estado = "Alta";
          clase = "alto";
        } else if (s >= 130) {
          estado = "Elevada";
          clase = "medio";
        }

        /* ESTADO VISUAL */

        let estadoPresion = document.getElementById("estadoPresion");

        estadoPresion.innerText = estado;

        estadoPresion.className = "estado " + clase;

        /* GUARDAR PACIENTE */

        await fetch(
          "/guardar_paciente",

          {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              nombre,
              edad,
              sistolica: s,
              diastolica: d,
            }),
          },
        );

        /* SISTEMA EXPERTO */

        let res = await fetch(
          "/evaluar",

          {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify({
              sintomas,
            }),
          },
        );

        let data = await res.json();

        /* RESULTADO */

        document.getElementById("resultado").innerHTML = `

<div class="badge ${data.riesgo.toLowerCase()}">

${data.riesgo}

</div>

<p>

${data.mensajes}

</p>

<p>

${data.recomendacion}

</p>

`;

        /* VOZ */

        let texto = `

${nombre},
${edad} años.

Presión ${estado}.

Riesgo ${data.riesgo}.

${data.mensajes}.

${data.recomendacion}

`;

        let voz = new SpeechSynthesisUtterance(texto);

        voz.lang = "es-MX";

        speechSynthesis.speak(voz);
      }
    </script>
  </body>
</html>
